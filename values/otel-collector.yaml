mode: deployment

image:
  repository: "otel/opentelemetry-collector-contrib"

command:
  name: "otelcol-contrib"

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 512Mi

ports:
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false
  prometheus:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP

serviceMonitor:
  enabled: true
  metricsEndpoints:
    - port: prometheus

config:
  receivers:
    jaeger: null
    zipkin: null

  exporters:
    debug: {}
    prometheus:
      endpoint: ${env:MY_POD_IP}:8889
    # Loki 3.x aceita logs via OTLP nativamente em /otlp/v1/logs
    otlphttp/loki:
      logs_endpoint: http://loki:3100/otlp/v1/logs

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        # Placeholder: o exporter da ferramenta de APM (Datadog/New Relic) entra aqui
        # quando a instrumentação do código (Requisito 3) estiver pronta.
        exporters: [debug]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [prometheus, debug]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlphttp/loki, debug]
