apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nascied/fiap-tech-challenge-fase-4-monitoring
    targetRevision: main
    path: argocd/application
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
