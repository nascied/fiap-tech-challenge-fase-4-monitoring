apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

configMapGenerator:
  - name: toggle-master-overview-dashboard
    files:
      - toggle-master-overview.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
  - name: toggle-master-infra-dashboard
    files:
      - toggle-master-infra.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
